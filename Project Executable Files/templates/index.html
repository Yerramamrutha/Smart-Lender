<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Lender - Loan Approval Prediction</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 480px;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #777;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 13px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-size: 13px;
            color: #444;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row > div {
            flex: 1;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover {
            background: #5563c1;
        }
        .result {
            margin-top: 18px;
            padding: 12px;
            border-radius: 6px;
            background: #f0f4ff;
            text-align: center;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Smart Lender</h1>
        <p class="subtitle">ML-powered loan approval prediction</p>

        <form action="/predict" method="POST">
            <div class="row">
                <div>
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div>
                    <label>Married</label>
                    <select name="married" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Dependents</label>
                    <select name="dependents" required>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3+</option>
                    </select>
                </div>
                <div>
                    <label>Education</label>
                    <select name="education" required>
                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>
                    </select>
                </div>
            </div>

            <label>Self Employed</label>
            <select name="self_employed" required>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select>

            <div class="row">
                <div>
                    <label>Applicant Income</label>
                    <input type="number" step="any" name="applicant_income" required>
                </div>
                <div>
                    <label>Coapplicant Income</label>
                    <input type="number" step="any" name="coapplicant_income" required>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Loan Amount</label>
                    <input type="number" step="any" name="loan_amount" required>
                </div>
                <div>
                    <label>Loan Term (days)</label>
                    <input type="number" step="any" name="loan_term" value="360" required>
                </div>
            </div>

            <label>Credit History</label>
            <select name="credit_history" required>
                <option value="1">Good (1)</option>
                <option value="0">Bad (0)</option>
            </select>

            <label>Property Area</label>
            <select name="property_area" required>
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semiurban</option>
                <option value="Rural">Rural</option>
            </select>

            <button type="submit">Predict Loan Status</button>
        </form>

        {% if prediction_text %}
        <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
